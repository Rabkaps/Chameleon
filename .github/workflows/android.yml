name: Android CI

on:
  push:
    branches: [ main, master ]
    tags:
      - '*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Decode Release Keystore
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

    - name: Build APK (Standard and Special)
      run: ./gradlew assembleStandardRelease assembleSpecialRelease

    - name: Rename APKs for Release
      run: |
        cp app/build/outputs/apk/standard/release/app-standard-universal-release.apk Chameleon-standard-universal.apk
        cp app/build/outputs/apk/standard/release/app-standard-arm64-v8a-release.apk Chameleon-standard-arm64-v8a.apk
        cp app/build/outputs/apk/standard/release/app-standard-armeabi-v7a-release.apk Chameleon-standard-armeabi-v7a.apk
        cp app/build/outputs/apk/standard/release/app-standard-x86-release.apk Chameleon-standard-x86.apk
        cp app/build/outputs/apk/standard/release/app-standard-x86_64-release.apk Chameleon-standard-x86_64.apk
        cp app/build/outputs/apk/special/release/app-special-universal-release.apk Chameleon-special-universal.apk
        cp app/build/outputs/apk/special/release/app-special-arm64-v8a-release.apk Chameleon-special-arm64-v8a.apk
        cp app/build/outputs/apk/special/release/app-special-armeabi-v7a-release.apk Chameleon-special-armeabi-v7a.apk
        cp app/build/outputs/apk/special/release/app-special-x86-release.apk Chameleon-special-x86.apk
        cp app/build/outputs/apk/special/release/app-special-x86_64-release.apk Chameleon-special-x86_64.apk

    - name: Upload Chameleon APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Chameleon-apks
        path: |
          Chameleon-*.apk

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Chameleon-*.apk
        name: Chameleon ${{ github.ref_name }}
        body_path: .github/release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

